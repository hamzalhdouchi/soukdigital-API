<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <meta charset="UTF-8"/>
  <title>Code de vérification</title>
  <style>
    body { margin:0; padding:0; background:#f5f5f0; font-family:'Helvetica Neue', Arial, sans-serif; color:#333; }
    .wrapper { max-width:480px; margin:32px auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.08); }
    .header  { background:#c8963e; padding:24px 32px; text-align:center; }
    .header h1 { margin:0; color:#fff; font-size:20px; }
    .body    { padding:32px; text-align:center; }
    .code    { display:inline-block; margin:16px 0; background:#fdf3e3; border:2px dashed #c8963e; border-radius:8px; padding:14px 36px; font-size:36px; font-weight:700; letter-spacing:10px; color:#8b6914; }
    .body p  { font-size:14px; color:#666; line-height:1.6; }
    .footer  { background:#f5f5f0; padding:14px; text-align:center; font-size:12px; color:#aaa; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header"><h1>Souk Digital — Vérification</h1></div>
  <div class="body">
    <p>Utilisez le code ci-dessous pour vérifier votre compte.</p>
    <div class="code" th:text="${code}">000000</div>
    <p>Ce code est valide pendant <strong>5 minutes</strong>.<br/>
    Ne le partagez avec personne.</p>
    <p style="font-size:12px;color:#bbb;">Si vous n'avez pas demandé ce code, ignorez cet email.</p>
  </div>
  <div class="footer">&copy; 2025 Souk Digital</div>
</div>
</body>
</html>
